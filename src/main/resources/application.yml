spring:
  application:
    name: ze-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      api-key: ${BAILIAN_API_KEY}
      chat:
        options:
          model: deepseek-v4-pro
      embedding:
        options:
          model: text-embedding-v2
    mcp:
      client:
        sse:
          connections:
            server1:
              url: http://localhost:8127
              sse-endpoint: /sse
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000
        enable: false
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ze_ai_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: '/**'
      packages-to-scan: com.zegao.zeaiagent.Controller

knife4j:
  enable: true
  setting:
    language: zh_cn
